name: Weekly DevContainer Release
description: This workflow creates a weekly semantic version release when main changed since the last release tag.
on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false
jobs:
  prepare-release:
    name: Prepare Weekly Release
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    outputs:
      has_changes: ${{ steps.metadata.outputs.has_changes }}
      previous_tag: ${{ steps.metadata.outputs.previous_tag }}
      next_tag: ${{ steps.metadata.outputs.next_tag }}
      release_notes: ${{ steps.metadata.outputs.release_notes }}
    steps:
      - name: Checkout (GitHub)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Fetch tags
        run: git fetch --force --tags origin
      - name: Determine release metadata
        id: metadata
        run: ./scripts/release_metadata.sh >> "${GITHUB_OUTPUT}"
      - name: Skip release
        if: steps.metadata.outputs.has_changes != 'true'
        run: |
          if [ -n "${{ steps.metadata.outputs.previous_tag }}" ]; then
            echo "No commits since ${{ steps.metadata.outputs.previous_tag }}; skipping release."
          else
            echo "Repository has no releasable commits yet; skipping release."
          fi
  create-release:
    name: Create Git Tag And Release
    needs: [prepare-release, publish-release]
    if: needs.prepare-release.outputs.has_changes == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout (GitHub)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Fetch tags
        run: git fetch --force --tags origin
      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Create and push tag
        run: |
          git tag -a "${{ needs.prepare-release.outputs.next_tag }}" -m "chore(release): ${{ needs.prepare-release.outputs.next_tag }}"
          git push origin "${{ needs.prepare-release.outputs.next_tag }}"
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_NOTES: ${{ needs.prepare-release.outputs.release_notes }}
        run: |
          printf '%s\n' "${RELEASE_NOTES}" > release_notes.md
          gh release create "${{ needs.prepare-release.outputs.next_tag }}" \
            --title "${{ needs.prepare-release.outputs.next_tag }}" \
            --notes-file release_notes.md \
            # remove this and next line when the code works
            --draft \
            --latest
